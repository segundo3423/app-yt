<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="assets/quitar.png" class="quitar" alt="Quitar">
    <div class="barraLateral">
        <div>
            <h1>Chat Simple</h1>
        </div>
    </div>

    <div class="chatContenedor">
        <ul class="contenedorMensajes"style="color: white;">
        </ul>
        <form action="" class="formulario">
            <input type="text" placeholder="Escribe tu mensaje..." class="inputMensaje">
            <button type="submit" class="btnEnviar">Enviar</button>
        </form>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
