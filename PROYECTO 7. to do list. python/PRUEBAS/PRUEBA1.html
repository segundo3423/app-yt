<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .formPfp{
            margin-top: 100px;
            border-radius: 10px;
            width: 400px;
            height: 300px;
            background-color: rgb(87, 84, 238);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        .pfp{
            margin: 20px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
        }

        .pfp:hover{
            cursor: pointer;
            transform: scale(1.05);
            transition: transform 0.1s ease-in-out;
        }

        /* Estilo kawaii para el input */
        .input{
            width: 80%;
            height: 44px;
            border-radius: 14px;
            padding: 10px 14px;
            border: 2px solid rgba(0,0,0,0.06);
            background: linear-gradient(135deg, #fff6ff 0%, #f6fbff 100%);
            box-shadow: 0 8px 18px rgba(120,80,200,0.10), inset 0 -2px 0 rgba(255,255,255,0.6);
            font-size: 16px;
            color: #2b2b2b;
            outline: none;
            transition: transform .12s ease, box-shadow .12s ease, border-color .12s;
            caret-color: #7b5cff;
        }

        .input::placeholder{
            color: #bfaee8;
            opacity: 1;
        }

        .input:focus{
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(120,80,200,0.16);
            border-color: #7b5cff;
        }
    </style>
</head>
<body>
    <div class="formPfp">
        <img src="assets/default.png" class="pfp" alt="Default Profile Picture">
        <input type="text" class="input" value="name">
        <button class="btnSavePfp">guardar</button>
    </div>
</body>
</html>
